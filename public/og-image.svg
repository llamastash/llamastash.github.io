<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e2030"/>
      <stop offset="100%" stop-color="#24273a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="80" cy="80" r="10" fill="#c6a0f6"/>
  <text x="110" y="92" fill="#cad3f5" font-size="36" font-weight="600">llamastash</text>
  <text x="320" y="92" fill="#a5adcb" font-size="28" font-family="ui-monospace, Menlo, monospace">v0.0.1</text>

  <text x="80" y="270" fill="#cad3f5" font-size="76" font-weight="700">Launch local models</text>
  <text x="80" y="360" fill="#c6a0f6" font-size="76" font-weight="700">without leaving</text>
  <text x="595" y="360" fill="#cad3f5" font-size="76" font-weight="700">the terminal.</text>

  <text x="80" y="430" fill="#a5adcb" font-size="28">A keyboard-driven TUI for browsing your GGUF library</text>
  <text x="80" y="468" fill="#a5adcb" font-size="28">and running llama.cpp models. No daemon. No cloud.</text>

  <g transform="translate(80,520)">
    <rect width="700" height="64" rx="10" fill="#181926" stroke="#363a4f"/>
    <text x="22" y="42" fill="#a6da95" font-family="ui-monospace, Menlo, monospace" font-size="22">$ curl -fsSL https://llamastash.cli.rs/install.sh | sh</text>
  </g>

  <text x="80" y="612" fill="#6e738d" font-size="18" font-family="ui-monospace, Menlo, monospace">llamastash.cli.rs · github.com/llamastash/llamastash · MIT</text>
</svg>
